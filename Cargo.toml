[package]
name = "blastcap"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow.workspace = true
async-trait.workspace = true
futures.workspace = true
rand.workspace = true
rkyv.workspace = true
tokio.workspace = true
sharpify.workspace = true
serde.workspace = true
rmp-serde.workspace = true
pathfinding.workspace = true
math.workspace = true

[workspace]
members = [ "crates/*" ]

[workspace.dependencies]
anyhow = "1.0"
async-trait = "0.1.88"
futures = "0.3.31"
rand = "0.9.1"
rkyv = "0.8.10"
tokio = { version = "1.45.1", features = ["full"] }
sharpify = { path = "crates/sharpify" }
proc-macro2 = "1.0.95"
quote = "1.0.40"
syn = "2.0.104"
convert_case = "0.8.0"
serde = { version = "1.0.219", features = ["derive"] }
rmp-serde = "1.3.0"
pathfinding = "4.14.0"
math = { path = "crates/math" }