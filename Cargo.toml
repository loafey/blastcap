[package]
name = "blastcap"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0"
async-trait = "0.1.88"
clap = { version = "4.5", features = ["derive"] }
eframe = "0.31.1"
egui = "0.31.1"
futures = "0.3.31"
rand = "0.9.1"
rkyv = "0.8.10"
tokio = { version = "1.45.1", features = ["full"] }

